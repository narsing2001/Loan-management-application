spring.application.name=apigateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# route to service
spring.cloud.gateway.routes[0].id=service
spring.cloud.gateway.routes[0].uri=lb://service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

# route to service-not
spring.cloud.gateway.routes[1].id=service-not
spring.cloud.gateway.routes[1].uri=lb://service-not
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/service-not/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2