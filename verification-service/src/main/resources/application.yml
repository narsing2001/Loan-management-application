server:
  port: 8082

spring:
  application:
    name: document-verification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/VerificationDb
    username: postgres
    password: Pari123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: document-verification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

logging:
  level:
    root: INFO
    com.document.verification.service: DEBUG

topic:
  document-uploaded: documentUploadTopic

aws:
  region: AWS_REGION
  accessKey: AWS_ACCESS_KEY_ID
  secretKey: AWS_SECRET_ACCESS_KEY
  s3:
    bucket: documentdata-bucket

ocr:
  tessdata-path: C:/Program Files/Tesseract-OCR/tessdata

aadhaar:
  api:
    url: http://localhost:8082
    token: local-demo-token